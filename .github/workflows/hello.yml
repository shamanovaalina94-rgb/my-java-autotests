name: Запуск автотестов

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Установка Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Даем права на запуск gradlew
        run: chmod +x gradlew

      - name: Запуск тестов через Gradle
        run: ./gradlew test